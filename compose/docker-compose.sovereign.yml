# Sovereign overlay
#
# Adds:
#   - Tor SOCKS5 proxy for outbound api/bot traffic
#   - env_file from Apricorn mount for postgres/api/bot
#
# Does NOT redirect Docker volumes — they stay on the laptop's
# LUKS-encrypted SSD (fast, supports POSIX permissions).
# The Apricorn holds secrets only (.env, JWT keys).

services:
  tor-proxy:
    image: osminogin/tor-simple:latest
    container_name: sovereign-tor
    restart: unless-stopped
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  api:
    environment:
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started

  bot:
    environment:
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started
