# Sovereign overlay — Tor proxy for bot Telegram traffic

services:
  tor-proxy:
    build:
      context: ./tor-proxy
      dockerfile: Dockerfile
    container_name: sovereign-tor
    restart: unless-stopped
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  postgres:
    environment:
      SOVEREIGN_MODE: "true"

  api:
    environment:
      SOVEREIGN_MODE: "true"

  bot:
    environment:
      SOVEREIGN_MODE: "true"
      TOR_PROXY_URL: socks5h://tor-proxy:9050
    depends_on:
      tor-proxy:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_SOVEREIGN_MODE: "true"
