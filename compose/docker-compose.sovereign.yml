# Sovereign overlay — redirect persistent state to Apricorn
# Merges with base docker-compose.yml
# Volume lists APPEND in compose overrides, so base config file
# mounts (init.sql, redis.conf, Caddyfile) are preserved automatically.

services:
  tor-proxy:
    image: osminogin/tor-simple:latest
    container_name: sovereign-tor
    restart: unless-stopped
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  postgres:
    env_file:
      - /mnt/sovereign/data/env/.env

  redis: {}

  api:
    env_file:
      - /mnt/sovereign/data/env/.env
    environment:
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started

  bot:
    env_file:
      - /mnt/sovereign/data/env/.env
    environment:
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started

  dashboard: {}

  caddy: {}

# Redirect named volumes to Apricorn bind mounts
volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/postgres/data
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/redis/data
  backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/backups
  caddy-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/caddy/data
  caddy-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/caddy/config
  postgres-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/sovereign/data/logs/postgres
