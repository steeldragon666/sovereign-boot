# Sovereign overlay
#
# Adds:
#   - Tor SOCKS5 proxy for outbound api/bot traffic
#   - env_file from Apricorn mount for postgres/api/bot
#
# Does NOT redirect Docker volumes — they stay on the laptop's
# LUKS-encrypted SSD (fast, supports POSIX permissions).
# The Apricorn holds secrets only (.env, JWT keys).

services:
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: sovereign-tor
    restart: unless-stopped
    environment:
      TOR_NewCircuitPeriod: "30"
    networks:
      - sovereign-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-sf", "--socks5-hostname", "localhost:9050", "https://check.torproject.org/api/ip"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  postgres:
    environment:
      SOVEREIGN_MODE: "true"

  api:
    environment:
      SOVEREIGN_MODE: "true"
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started

  bot:
    environment:
      SOVEREIGN_MODE: "true"
      HTTPS_PROXY: socks5h://tor-proxy:9050
      HTTP_PROXY: socks5h://tor-proxy:9050
      NO_PROXY: postgres,redis,localhost,127.0.0.1,api,bot,dashboard,caddy
    depends_on:
      tor-proxy:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_SOVEREIGN_MODE: "true"
